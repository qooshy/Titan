
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ymmo
      POSTGRES_PASSWORD: ymmo_pass
      POSTGRES_DB: ymmo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ymmo:ymmo_pass@db:5432/ymmo_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  pgdata:
